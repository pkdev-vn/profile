<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Web Đa Trang Python</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f9f9f9; text-align: center; }
        nav { background: #333; padding: 15px; }
        nav a { color: white; margin: 0 15px; text-decoration: none; font-weight: bold; }
        nav a:hover { color: #deff9a; }
        .container { padding: 40px; background: white; max-width: 800px; margin: 30px auto; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        footer { margin-top: 50px; color: #777; font-size: 14px; }
    </style>
</head>
<body>

    <nav>
        <a href="/">Trang Chủ</a>
        <a href="/about">Giới Thiệu</a>
        <a href="/contact">Liên Hệ</a>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <footer>
        <p>© 2026 Website by Devpython.</p>
    </footer>

</body>
</html>
